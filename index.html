<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natalia del Carmen González Onieva | Computer Engineering Student | Aspiring Software Engineer</title>
    <link rel="icon" type="image/x-icon" href="imagenes/ImagenesGitHub/profile.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #00ff88;
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.85);
        }

        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e293b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
    width: 100px;           /* Tamaño más pequeño */
    height: 100px;          /* Debe ser igual al ancho */
    border-radius: 50%;     /* Esto la hace circular */
    object-fit: cover;      /* Evita que la imagen se deforme */
    border: 2.5px solid var(--primary);
    padding: 4px;
    margin-bottom: 15px;
    display: block;         /* Para poder centrarla */
    margin-left: auto;      /* Centrado horizontal */
    margin-right: auto;     /* Centrado horizontal */
}
        h1 { margin: 10px 0 5px; font-size: 1.6rem; color: #fff; }
        
        .badge {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        /* --- AQUÍ ESTÁ EL CAMBIO PARA QUE SE VEAN UNO DEBAJO DE OTRO --- */
        .console {
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent);
            margin-bottom: 20px;
            display: flex;         /* Activamos Flexbox */
            flex-direction: column; /* Alineación en columna (vertical) */
            gap: 8px;              /* Espacio entre cada línea */
        }

        .console b { color: var(--accent); }

        .progress-container {
            text-align: left;
            margin-bottom: 20px;
        }

        .progress-label {
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            color: var(--accent);
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 25%; 
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 10px var(--accent);
            animation: loading 2s ease-out forwards;
        }

        @keyframes loading { from { width: 0%; } to { width: 25%; } }

        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
        }

        .tech-icon { font-size: 1.4rem; color: #94a3b8; transition: 0.3s; }
        .tech-icon:hover { color: var(--primary); transform: translateY(-3px); }

        .cert-tag {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .social-btns {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }

        .social-btns a { color: #f1f5f9; font-size: 1.6rem; transition: 0.3s; }
        .social-btns a:hover { color: var(--primary); transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
<img src="https://i.pinimg.com/736x/a8/be/b5/a8beb52dbe2db6ecb99360ecbe7fb858.jpg" alt="Profile" class="profile-img">        
        <h1>Natalia del Carmen González Onieva</h1>
        <span class="badge">Computer Engineering Student | Aspiring Software Engineer</span>

        <div class="console">
            <span><b>> spawn:</b> Vélez-Málaga, Málaga 🇪🇸</span>
            <span><b>> university:</b> UMA (Informática)</span>
            <span><b>> status:</b> Learning code...</span>
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span><i class="fas fa-microchip"></i> Grado Ing. Informática</span>
                <span>25%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="tech-stack">
            <i class="fab fa-java tech-icon"></i>
            <i class="fab fa-python tech-icon"></i>
            <i class="fab fa-html5 tech-icon"></i>
            <span class="tech-icon" style="font-weight:bold; font-size:1.1rem;">C++</span>
        </div>

        <div class="cert-tag">
            <i class="fas fa-medal"></i> ENGLISH B1 LEVEL (PET)
        </div>

        <div class="social-btns">
            <a href="https://github.com/ngonzalez2025" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/natalia-del-carmen-gonz%C3%A1lez-onieva-03725b308/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:tu-correo@uma.es"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
