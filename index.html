<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGonzalez | Future TIC Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Fira Code', monospace, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Efecto de brillo superior */
        .container::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--secondary));
            border-radius: 24px;
            z-index: -1;
            opacity: 0.3;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 5px;
            background: var(--bg);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover { transform: scale(1.05) rotate(5deg); }

        h1 { margin: 10px 0 5px; font-size: 1.8rem; letter-spacing: -1px; }
        
        .badge {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid var(--primary);
            display: inline-block;
            margin-bottom: 25px;
        }

        .bio {
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        /* Tech Stack */
        .skills-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .skill-icon {
            font-size: 1.2rem;
            color: #94a3b8;
            transition: color 0.3s;
        }
        .skill-icon:hover { color: var(--primary); }

        /* B1 Level */
        .cert-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(90deg, #10b981, #059669);
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .social-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btns a {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-btns a:hover {
            background: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        code { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <img src="foto.jpg" alt="Dev" class="profile-img">
        <h1>NGonzalez</h1>
        <div class="badge">Future TIC Engineer</div>

        <div class="bio">
            <p><code>> status:</code> Estudiando Ingeniería Informática en la UMA (2025-Presente).</p>
            <p><code>> goal:</code> Learning to build the future, one line of code at a time.</p>
        </div>

        <div class="skills-grid">
            <i class="fab fa-python skill-icon" title="Python"></i>
            <i class="fab fa-js skill-icon" title="JavaScript"></i>
            <i class="fas fa-database skill-icon" title="SQL"></i>
            <i class="fab fa-git-alt skill-icon" title="Git"></i>
        </div>

        <div class="cert-tag">
            <i class="fas fa-award"></i> English B1 Level Certified
        </div>

        <div class="social-btns">
            <a href="https://github.com/ngonzalez2025" target="_blank"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:tu-email@ejemplo.com"><i class="fas fa-envelope"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

</body>
</html>
