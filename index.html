<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGonzalez | Future TIC Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #00ff88;
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e293b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            padding: 4px;
            margin-bottom: 15px;
        }

        h1 { margin: 10px 0 5px; font-size: 1.7rem; color: #fff; }
        
        .badge {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            display: block;
        }

        /* Estilo Consola/Programador */
        .console {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent);
            margin-bottom: 25px;
        }

        .console code { display: block; margin-bottom: 8px; }
        .console b { color: var(--accent); }

        /* Certificado B1 con estilo limpio */
        .cert-tag {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        /* Redes sociales sin bordes gigantes */
        .social-btns {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }

        .social-btns a {
            color: #f1f5f9;
            font-size: 1.5rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-btns a:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        /* Estilos de la Barra de Progreso */
.progress-container {
    text-align: left;
    margin-bottom: 25px;
}

.progress-label {
    font-size: 0.75rem;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    color: var(--accent); /* El verde neón que usamos */
}

.progress-bar-bg {
    width: 100%;
    height: 12px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    border: 1px solid rgba(0, 255, 136, 0.2);
    overflow: hidden;
    position: relative;
}

.progress-bar-fill {
    width: 25%; /* Este es el progreso actual */
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    box-shadow: 0 0 10px var(--accent);
    border-radius: 10px;
    animation: loading 2s ease-out forwards;
}

@keyframes loading {
    from { width: 0%; }
    to { width: 25%; }
}

    </style>
</head>
<body>

    <div class="container">
<img src="imagenes/ImagenesGitHub/profile.jpeg" alt="Natalia" class="profile-img">        
        <h1>Natalia del Carmen Gonzalez Onieva</h1>
        <span class="badge">Future TIC Engineer</span>

        <div class="console">
            <code><b>> spawn:</b> Vélez-Málaga,Málaga,Spain 🇪🇸</code>
            <code><b>> university:</b> UMA (Informatica)</code>
            <code><b>> status:</b>Learning code...</code>
        </div>

        <div class="progress-container">
    <div class="progress-label">
        <span><i class="fas fa-microchip"></i> Grado Ing. Informática</span>
        <span>25%</span>
    </div>
    <div class="progress-bar-bg">
        <div class="progress-bar-fill"></div>
    </div>
</div>

        <div class="tech-stack">
            <i class="fab fa-java tech-icon" title="Java"></i>
            <i class="fab fa-python tech-icon" title="Python"></i>
            <i class="fab fa-html5 tech-icon" title="HTML5"></i>
            <span class="tech-icon" title="C++" style="font-weight: bold; font-size: 1.2rem; font-family: sans-serif;">C++</span>
        </div>

        <div class="cert-tag">
            <i class="fas fa-medal"></i> ENGLISH B1 LEVEL (PET)
        </div>

        <div class="social-btns">
            <a href="https://github.com/ngonzalez2025" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/natalia-del-carmen-gonz%C3%A1lez-onieva-03725b308/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:tu-email@ejemplo.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
