<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGonzalez | Future TIC Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --text: #f1f5f9;
            --glass: rgba(30, 41, 59, 0.8);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        h1 { 
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .badge {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin: 5px 0 25px 0;
        }

        .info-box {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .info-item:last-child { margin-bottom: 0; }

        .info-item i { width: 20px; color: var(--primary); }

        /* Iconos de Redes Sociales Limpios */
        .social-btns {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }

        .social-btns a {
            color: #94a3b8;
            font-size: 1.6rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-btns a:hover {
            color: var(--primary);
            transform: translateY(-3px);
        }

        .flag { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <img src="Code Hobby.jpeg" alt="Natalia" class="profile-img">
        
        <h1>NGonzalez</h1>
        <span class="badge">Future TIC Engineer</span>

        <div class="info-box">
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Vélez-Málaga, Spain <span class="flag">🇪🇸</span></span>
            </div>
            <div class="info-item">
                <i class="fas fa-graduation-cap"></i>
                <span>Ingeniería Informática (UMA)</span>
            </div>
            <div class="info-item">
                <i class="fas fa-certificate"></i>
                <span>English B1 Level (PET)</span>
            </div>
        </div>

        <div class="social-btns">
            <a href="https://github.com/ngonzalez2025" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/natalia-del-carmen-gonz%C3%A1lez-onieva-03725b308/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:tu-correo@ejemplo.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
